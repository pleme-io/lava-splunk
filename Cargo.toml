[package]
authors = ["pleme-io"]
description = "lava-splunk — autogenerated typed (deflava-resource …) shapes for the splunk terraform provider. Mirrors pangea-splunk. Source schema kept under schema.json; resources/*.tlisp + _index.tlisp regenerated via `lava-forge generate --schema schema.json --out resources`."
edition = "2024"
license = "MIT"
name = "lava-splunk"
readme = "README.md"
repository = "https://github.com/pleme-io/lava-splunk"
version = "0.1.1"

[lib]
name = "lava_splunk"
path = "src/lib.rs"

[lints.clippy]
pedantic = "warn"
